name: ClientPortal
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: client-portal-build-scan:${{ github.sha }}
          load: true
    
      - name: run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'client-portal-build-scan:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          format: 'table'

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: client-portal-tests:${{ github.sha }}
          load: true
 
      - name: run tests
        run: |
          docker run --rm client-portal-tests:${{ github.sha }} pytest /app/tests/just-a-test.py

  build-in-registry:
    needs: [build-scan, tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Format: ghcr.io/OWNER/REPO:TAG
          tags: |
            ghcr.io/$${{ github.repository_owner }}/client-portal:$${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/client-portal:latest
          # Optional: Add labels for better management
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
