name: ClientPortal
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  client-portal:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
        
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: build Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: false
          tags: ClientPortal:${{ github.sha }}
          load: true
          
